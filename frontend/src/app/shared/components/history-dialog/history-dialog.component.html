<div class="history-container p-4">
  <div class="header flex justify-content-between align-items-center mb-4">
    <h2 class="text-2xl font-bold flex align-items-center gap-2 m-0 text-primary">
      <i class="pi pi-history text-2xl"></i>
      Audit History: {{ config.data.title }}
    </h2>
    <p-button icon="pi pi-times" [rounded]="true" [text]="true" (click)="close()"></p-button>
  </div>

  <div *ngIf="loading" class="flex flex-column align-items-center justify-content-center py-8">
    <i class="pi pi-spin pi-spinner text-4xl text-500 mb-3"></i>
    <p class="text-600">Loading audit revisions...</p>
  </div>

  <div
    *ngIf="!loading && revisions.length === 0"
    class="flex flex-column align-items-center justify-content-center py-8 text-500"
  >
    <i class="pi pi-info-circle text-4xl mb-3"></i>
    <p>No history found for this record.</p>
  </div>

  <p-table
    *ngIf="!loading && revisions.length > 0"
    [value]="pagedRevisions"
    [scrollable]="true"
    scrollHeight="500px"
    styleClass="p-datatable-sm p-datatable-striped shadow-1 border-round overflow-hidden"
  >
    <ng-template pTemplate="header">
      <tr>
        <th style="width: 80px">Rev #</th>
        <th style="width: 200px">Date & Time</th>
        <th style="width: 120px">Action</th>
        <th>Snapshot</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-rev>
      <tr>
        <td>
          <span class="font-bold text-700">#{{ rev.revisionId }}</span>
        </td>
        <td>
          <div class="flex flex-column">
            <span class="text-800">{{ rev.revisionDate | date: 'medium' }}</span>
          </div>
        </td>
        <td>
          <p-tag [value]="rev.revisionType" [severity]="getSeverity(rev.revisionType)"></p-tag>
        </td>
        <td>
          <div class="json-snapshot">
            <pre>{{ rev.entity | json }}</pre>
          </div>
        </td>
      </tr>
    </ng-template>
  </p-table>

  <div *ngIf="!loading && revisions.length > 0" class="table-footer mt-3">
    <div class="table-footer__meta">Page {{ currentPage + 1 }} • Next {{ hasNextPage ? 1 : 0 }}</div>
    <div class="table-footer__actions">
      <button class="table-footer__btn" type="button" (click)="previousPage()" [disabled]="loading || isFirstPage">
        <i class="pi pi-angle-left"></i>
        <span>Previous</span>
      </button>
      <button
        class="table-footer__btn table-footer__btn--next"
        type="button"
        (click)="nextPage()"
        [disabled]="loading || !hasNextPage"
      >
        <span>Next</span>
        <i class="pi pi-angle-right"></i>
      </button>
    </div>
  </div>

  <div class="flex justify-content-end mt-4">
    <p-button label="Close" icon="pi pi-check" (click)="close()"></p-button>
  </div>
</div>
