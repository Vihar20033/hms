<div class="dashboard-layout">
  <app-sidebar></app-sidebar>

  <main class="main-content">
    <app-header></app-header>

    <div class="page-body">
      <div class="content-header">
        <div class="title-section">
          <h1>Billing & Invoices</h1>
          <p>Manage patient invoices and payment records</p>
        </div>
        @if (userRole === 'ADMIN' || userRole === 'RECEPTIONIST') {
          <div class="header-actions">
            <button class="btn-primary" (click)="openCreateForm()"><i class="ri-add-line"></i> Create Invoice</button>
          </div> 
        }
      </div>

      @if (showCreateForm) {
        <app-billing-form
          [form]="billingForm"
          [patients]="patients"
          [manualPatientAppointments]="manualPatientAppointments"
          [isSyncingItems]="isSyncingItems"
          [isSubmitting]="isSubmitting"
          [today]="today"
          (close)="closeForm()"
          (submitForm)="onSubmit()"
          (addItem)="addItem()"
          (removeItem)="removeItem($event)"
          (appointmentSelected)="onAppointmentSelectedForManual($event)"
        ></app-billing-form>
      } @else {
        <app-billing-table
          [billings]="billings"
          [isLoading]="isLoading"
          [userRole]="userRole"
          [exportingId]="exportingId"
          (view)="onView($event)"
          (updateStatus)="onUpdateStatus($event.id, $event.status)"
          (exportPdf)="onExportPdf($event)"
          (delete)="onDelete($event)"
        ></app-billing-table>
      }
    </div>
  </main>
</div>

<app-billing-view-modal
  [billing]="selectedBilling"
  (close)="closeViewModal()"
  (exportPdf)="onExportPdf($event)"
></app-billing-view-modal>
