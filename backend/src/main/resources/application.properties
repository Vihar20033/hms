spring.application.name=artem-health-hms-backend
server.port=${SERVER_PORT:8081}
spring.profiles.active=${SPRING_PROFILES_ACTIVE:mysql,local}

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.info.env.enabled=true

# Local-safe default: create/update tables during development.
# Use HMS_DDL_AUTO=validate in production once migrations are introduced.
spring.jpa.hibernate.ddl-auto=${HMS_DDL_AUTO:update}
spring.jpa.generate-ddl=true
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# JWT Configuration (Externalized Secret for Production)
# To overwrite in production, set Environment Variable: JWT_SECRET_KEY
hms.jwt.secret=${JWT_SECRET_KEY:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
hms.jwt.expirationMs=3600000
hms.jwt.refreshExpirationMs=604800000
hms.jwt.cookieSecure=false
hms.jwt.cookieSameSite=Lax
hms.frontend.api-url=${HMS_FRONTEND_API_URL:http://localhost:8080/api/v1}
hms.frontend.allowed-origins=${HMS_ALLOWED_ORIGINS:http://localhost:4200,http://127.0.0.1:4200}

# Redis Configuration
spring.data.redis.host=${REDIS_HOST:redis-16517.c244.us-east-1-2.ec2.cloud.redislabs.com}
spring.data.redis.port=${REDIS_PORT:16517}
spring.data.redis.username=${REDIS_USERNAME:default}
spring.data.redis.password=${REDIS_PASSWORD:aJqtsD3vOrNH3NmfjPocRWVJqp6mOiRv}
spring.data.redis.ssl.enabled=${REDIS_SSL_ENABLED:true}
spring.data.redis.timeout=2000
hms.cache.redis.enabled=${HMS_REDIS_CACHE_ENABLED:true}

# Redisson - minimal connection pool to stay within Redis Labs free tier limits
spring.redis.redisson.file=classpath:redisson-local.yaml

hms.rate-limit.enabled=true
hms.rate-limit.capacity=120
hms.rate-limit.refill-tokens=120 
hms.rate-limit.refill-minutes=1

# CORS Configuration
cors.max-age=3600
cors.allow-credentials=true
cors.debug=false

# Logging Configuration
logging.level.root=INFO
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=INFO
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.hibernate.tool.schema=DEBUG
logging.level.com.hms=DEBUG

# Canonical backend-local log directory used by logback-spring.xml.
hms.logging.path=${HMS_LOG_PATH:${user.dir}/logs}
hms.logging.app-file-name=${HMS_LOG_FILE_NAME:artem-health-hms-app.log}
hms.logging.audit-file-name=${HMS_AUDIT_LOG_FILE_NAME:artem-health-hms-audit.log}

spring.devtools.restart.enabled=true

# Cloudinary Configuration
hms.cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:dvdddpozn}
hms.cloudinary.api-key=${CLOUDINARY_API_KEY:598854156752521}
hms.cloudinary.api-secret=${CLOUDINARY_API_SECRET:Pfsx_lObz39AguhM9tm_mtDxdBg}
