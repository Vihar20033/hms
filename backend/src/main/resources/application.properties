spring.application.name=backend
server.port=8082
spring.profiles.default=mysql

# Request size limits (production hardening)
server.tomcat.max-http-form-post-size=1MB
server.tomcat.max-swallow-size=2MB
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Rate limiting configuration
hms.rate-limit.auth.capacity=10
hms.rate-limit.auth.refill-minutes=1

# API docs (Swagger UI at /swagger-ui.html, OpenAPI JSON at /api-docs)
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Production-safe default: validate schema instead of mutating it at startup
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Connection pool tuning
spring.datasource.hikari.maximum-pool-size=15
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.leak-detection-threshold=60000

# JWT Configuration
hms.jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
hms.jwt.expirationMs=86400000

# CORS Configuration
cors.max-age=3600
cors.allow-credentials=true
cors.debug=false

# Logging Configuration
logging.level.root=INFO
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=INFO
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.com.hms=DEBUG

spring.devtools.restart.enabled=true
