# Production profile. Secrets must be supplied from the runtime environment.
spring.jpa.hibernate.ddl-auto=${HMS_DDL_AUTO:validate}
spring.jpa.show-sql=false
spring.devtools.restart.enabled=false

hms.jwt.secret=${JWT_SECRET_KEY}
hms.jwt.cookieSecure=${JWT_COOKIE_SECURE:true}
hms.jwt.cookieSameSite=${JWT_COOKIE_SAME_SITE:None}
hms.frontend.allowed-origins=${HMS_ALLOWED_ORIGINS}

spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.username=${REDIS_USERNAME:default}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.ssl.enabled=${REDIS_SSL_ENABLED:true}

hms.cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
hms.cloudinary.api-key=${CLOUDINARY_API_KEY}
hms.cloudinary.api-secret=${CLOUDINARY_API_SECRET}

